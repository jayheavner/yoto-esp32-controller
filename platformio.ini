; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:waveshare-s3-43b]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
build_flags = 
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DLV_CONF_INCLUDE_SIMPLE
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=0
	-I include
lib_deps =
	lvgl/lvgl@^8.3.0
	bblanchon/ArduinoJson@^7
	kikuchan98/pngle@^1.1.0
	bitbank2/JPEGDEC@^1.8.0
	ayushsharma82/ElegantOTA@^3.1.0
monitor_speed = 115200
upload_speed = 921600

; ---- Wireless upload (OTA) ----
; After ONE more USB-C flash of the env above (to get OTA-capable firmware onto the board),
; push future builds over WiFi with:  pio run -e waveshare-s3-43b-ota -t upload
; upload_port can be the mDNS name below or the board IP shown on its boot screen.
[env:waveshare-s3-43b-ota]
extends = env:waveshare-s3-43b
upload_protocol = espota
upload_port = yoto-controller.local
; upload_flags = --auth=YOUR_OTA_PASSWORD   ; uncomment + match secrets.h OTA_PASSWORD if you set one
